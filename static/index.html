<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleWeather</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', 'Monaco', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0a0e27;
        }

        .weather-container {
            background: #1a1f3a;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            /* width: 400px; */
            max-width: 80vw;
        }

        .header {
            background: #0f1225;
            color: #e0e0e0;
            padding: 24px;
            text-align: center;
            font-size: 1.8em;
            border-bottom: 1px solid #2a2f4a;
        }

        .search-section {
            padding: 20px;
            background: #1a1f3a;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #2a2f4a;
            background: #242a45;
            color: #e0e0e0;
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 1em;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #3a4570;
            background: #2a3050;
        }

        .search-btn {
            padding: 12px 24px;
            border: 1px solid #3a4570;
            background: #2e3a5f;
            color: #64b5f6;
            font-family: 'Courier New', 'Monaco', monospace;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s ease;
        }

        .search-btn:hover {
            background: #364470;
            border-color: #4a5580;
        }

        .search-btn:active {
            transform: scale(0.96);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
            color: #64b5f6;
            font-size: 1.1em;
        }

        .loading.show {
            display: block;
        }

        .weather-result {
            padding: 30px 20px;
            display: none;
        }

        .weather-result.show {
            display: block;
        }

        .city-header {
            font-size: 1.4em;
            color: #e0e0e0;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .country {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 16px;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .icon {
            font-size: 3.5em;
        }

        .temperature {
            font-size: 2.5em;
            color: #4caf50;
            font-weight: bold;
        }

        .details {
            background: #242a45;
            border: 1px solid #2a2f4a;
            border-radius: 6px;
            padding: 16px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #b0b0b0;
            font-size: 0.95em;
        }

        .detail-row:not(:last-child) {
            border-bottom: 1px solid #1a1f35;
        }

        .detail-label {
            color: #888;
        }

        .detail-value {
            color: #e0e0e0;
            font-weight: 500;
        }

        .error {
            display: none;
            padding: 20px;
            background: #4a2a2a;
            color: #ff6b6b;
            text-align: center;
            border-top: 1px solid #2a2f4a;
            font-size: 0.95em;
        }

        .error.show {
            display: block;
        }

        .info {
            text-align: center;
            padding: 12px;
            font-size: 0.8em;
            color: #555;
            background: #0f1225;
            border-top: 1px solid #2a2f4a;
        }

        .forecast-section {
            padding: 20px;
            background: #1a1f3a;
            border-top: 1px solid #2a2f4a;
        }

        .forecast-label {
            font-size: 0.95em;
            color: #888;
            margin-bottom: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .forecast-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .forecast-card {
            background: #242a45;
            border: 1px solid #2a2f4a;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            transition: all 0.15s ease;
        }

        .forecast-card:hover {
            border-color: #3a4570;
            background: #2a3050;
        }

        .forecast-date {
            font-size: 0.8em;
            color: #888;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 2em;
            margin-bottom: 8px;
            display: block;
        }

        .forecast-temps {
            font-size: 0.9em;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .forecast-temp-max {
            color: #ff9999;
        }

        .forecast-temp-min {
            color: #99bbff;
        }

        .forecast-detail {
            font-size: 0.75em;
            color: #888;
            padding: 4px 0;
        }

        /* Mobile responsive: 3 columns on tablets, stack on small phones */
        @media (max-width: 768px) {
            .forecast-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 480px) {
            .forecast-container {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .forecast-card {
                padding: 10px;
            }

            .forecast-icon {
                font-size: 1.5em;
                margin-bottom: 6px;
            }

            .forecast-temps {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div class="weather-container">
        <div class="header">🌤️ SimpleWeather</div>
        
        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                class="search-input" 
                placeholder="Enter city name..."
                autocomplete="off"
            >
            <button class="search-btn" onclick="searchWeather()">Search</button>
        </div>

        <div class="loading" id="loading">Loading weather...</div>

        <div class="weather-result" id="weatherResult">
            <div class="city-header" id="cityName"></div>
            <div class="country" id="country"></div>
            
            <div class="weather-main">
                <div class="icon" id="weatherIcon">☀️</div>
                <div class="temperature" id="temperature">--°C</div>
            </div>

            <div class="details">
                <div class="detail-row">
                    <span class="detail-label">Feels Like</span>
                    <span class="detail-value" id="feelsLike">--°C</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Humidity</span>
                    <span class="detail-value" id="humidity">--%</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Wind Speed</span>
                    <span class="detail-value" id="windSpeed">-- km/h</span>
                </div>
            </div>

            <div class="forecast-section" id="forecastSection">
                <div class="forecast-label">5-Day Forecast</div>
                <div class="forecast-container" id="forecastContainer">
                    <!-- Forecast cards will be inserted here by JavaScript -->
                </div>
            </div>
        </div>

        <div class="error" id="error"></div>
        <div class="info">SimpleWeather • Open-Meteo API</div>
    </div>

    <script>
        const cityInput = document.getElementById('cityInput');
        const searchBtn = document.querySelector('.search-btn');
        const loading = document.getElementById('loading');
        const weatherResult = document.getElementById('weatherResult');
        const errorDiv = document.getElementById('error');

        // Allow Enter key to search
        cityInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        async function searchWeather() {
            const city = cityInput.value.trim();
            
            if (!city) {
                showError('Please enter a city name');
                return;
            }

            // Clear previous results
            hideError();
            weatherResult.classList.remove('show');
            loading.classList.add('show');

            try {
                const response = await fetch('/api/weather', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ city: city })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Failed to fetch weather');
                    loading.classList.remove('show');
                    return;
                }

                // Display weather data
                document.getElementById('cityName').textContent = data.city;
                document.getElementById('country').textContent = data.country;
                document.getElementById('temperature').textContent = `${data.temperature}°C`;
                document.getElementById('feelsLike').textContent = `${data.feels_like}°C`;
                document.getElementById('humidity').textContent = `${data.humidity}%`;
                document.getElementById('windSpeed').textContent = `${data.wind_speed} km/h`;
                document.getElementById('weatherIcon').textContent = data.icon;

                // Display forecast if available
                if (data.forecast && data.forecast.length > 0) {
                    displayForecast(data.forecast);
                    document.getElementById('forecastSection').style.display = 'block';
                } else {
                    document.getElementById('forecastSection').style.display = 'none';
                }

                loading.classList.remove('show');
                weatherResult.classList.add('show');

            } catch (error) {
                showError('Network error. Please try again.');
                loading.classList.remove('show');
            }
        }

        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function hideError() {
            errorDiv.classList.remove('show');
            errorDiv.textContent = '';
        }

        function formatForecastDate(dateStr) {
            // dateStr format: "2026-04-15"
            const date = new Date(dateStr + 'T00:00:00');
            const options = { weekday: 'short', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        function displayForecast(forecast) {
            const container = document.getElementById('forecastContainer');
            container.innerHTML = ''; // Clear previous forecast

            forecast.forEach(day => {
                const card = document.createElement('div');
                card.className = 'forecast-card';
                
                const formattedDate = formatForecastDate(day.date);
                
                card.innerHTML = `
                    <div class="forecast-date">${formattedDate}</div>
                    <span class="forecast-icon">${day.icon}</span>
                    <div class="forecast-temps">
                        <span class="forecast-temp-max">${day.temp_max}°</span>
                        <span>·</span>
                        <span class="forecast-temp-min">${day.temp_min}°</span>
                    </div>
                    <div class="forecast-detail">💧 ${day.precipitation_prob}%</div>
                    <div class="forecast-detail">💨 ${day.wind_speed} km/h</div>
                `;
                
                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
